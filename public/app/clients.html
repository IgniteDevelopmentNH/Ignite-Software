<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients · Ignite Manager</title>
  <link rel="icon" href="/assets/favicon-64.png" sizes="64x64" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/shared.css" />
  <style>
    .row-x { border: none; background: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; line-height: 1; padding: 4px 8px; }
    .row-x:hover { color: var(--orange-dark); }
    .status-toggle { border: none; cursor: pointer; font-family: var(--font); }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar-root"></aside>
    <main class="content">
      <div class="page-head">
        <div><h1>Clients</h1><p class="sub" id="count-sub">—</p></div>
        <div class="page-actions"><button class="btn btn-primary" id="new-btn">+ New client</button></div>
      </div>
      <div class="panel"><div class="table-scroll"><table class="data-table">
        <thead><tr><th>Name</th><th>Company</th><th>Contact</th><th>Service</th><th>Status</th><th style="width:40px;"></th></tr></thead>
        <tbody id="rows"></tbody>
      </table></div><div id="empty" class="empty hidden">No clients yet.</div></div>
    </main>
  </div>

  <script src="/assets/shared.js"></script>
  <script>
    requireAuth();
    initShell('clients');
    let items = [];

    function render() {
      const list = items.filter((c) => !c.archived).sort((a, b) => (a.name || a.company || '').localeCompare(b.name || b.company || ''));
      document.getElementById('count-sub').textContent = `${list.length} total`;
      document.getElementById('empty').classList.toggle('hidden', list.length > 0);
      document.getElementById('rows').innerHTML = list.map((c) => {
        const active = (c.status || 'active') === 'active';
        return `<tr>
          <td style="font-weight:600;">${escapeHtml(c.name || '—')}</td>
          <td>${escapeHtml(c.company || '—')}</td>
          <td>${escapeHtml(c.contact || '—')}</td>
          <td>${escapeHtml(c.service || '—')}</td>
          <td><button class="badge status-toggle ${active ? 'badge-orange' : 'badge-gray'}" data-id="${c.id}" title="Click to toggle">${active ? 'Active' : 'Inactive'}</button></td>
          <td class="num-cell"><button class="row-x" data-id="${c.id}" title="Remove">✕</button></td>
        </tr>`;
      }).join('');
      document.querySelectorAll('.status-toggle').forEach((b) => b.addEventListener('click', async () => {
        const c = items.find((x) => x.id === b.dataset.id); if (!c) return;
        const next = (c.status || 'active') === 'active' ? 'inactive' : 'active';
        try { await api(`/api/clients/${c.id}`, { method: 'PATCH', body: JSON.stringify({ status: next }) }); c.status = next; render(); }
        catch (e) { toast(e.message, true); }
      }));
      document.querySelectorAll('.row-x').forEach((b) => b.addEventListener('click', async () => {
        if (!confirm('Remove this client?')) return;
        try { await api(`/api/clients/${b.dataset.id}`, { method: 'DELETE' }); const c = items.find((x) => x.id === b.dataset.id); if (c) c.archived = true; toast('Client removed'); render(); }
        catch (e) { toast(e.message, true); }
      }));
    }

    function openForm() {
      const modal = openModal(`
        <h2>New client</h2>
        <div class="field"><label>Name</label><input id="f-name" /></div>
        <div class="field"><label>Company</label><input id="f-company" /></div>
        <div class="field"><label>Contact</label><input id="f-contact" /></div>
        <div class="field"><label>Service</label><input id="f-service" /></div>
        <div class="field"><label>Status</label><select id="f-status"><option value="active" selected>Active</option><option value="inactive">Inactive</option></select></div>
        <p class="form-error" id="f-err"></p>
        <div class="modal-actions"><button class="btn btn-ghost" id="f-cancel">Cancel</button><button class="btn btn-primary" id="f-save">Add client</button></div>`);
      modal.querySelector('#f-cancel').addEventListener('click', closeModal);
      modal.querySelector('#f-save').addEventListener('click', async () => {
        const body = {
          name: modal.querySelector('#f-name').value.trim(),
          company: modal.querySelector('#f-company').value.trim(),
          contact: modal.querySelector('#f-contact').value.trim(),
          service: modal.querySelector('#f-service').value.trim(),
          status: modal.querySelector('#f-status').value,
        };
        if (!body.name && !body.company) { modal.querySelector('#f-err').textContent = 'Enter a name or company.'; return; }
        try { const r = await api('/api/clients', { method: 'POST', body: JSON.stringify(body) }); items.push(r.record); closeModal(); toast('Client added'); render(); }
        catch (e) { modal.querySelector('#f-err').textContent = e.message; }
      });
      modal.querySelector('#f-name').focus();
    }

    async function load() {
      try { const r = await api('/api/clients'); items = r.clients || []; render(); }
      catch (e) { toast(e.message, true); }
    }
    document.getElementById('new-btn').addEventListener('click', openForm);
    load();
  </script>
</body>
</html>
